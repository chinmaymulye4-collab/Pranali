<!DOCTYPE html>
<html>
<head>
<title>A Question ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(-45deg,#ffdde1,#ee9ca7,#ffc3a0,#ffafbd);
background-size:400% 400%;
animation:bgmove 15s ease infinite;
overflow:hidden;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
margin-top:120px;
}

#story{
font-size:28px;
min-height:120px;
color:#333;
}

button{
font-size:22px;
padding:14px 35px;
margin:20px;
border:none;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

#yes{
background:#ff4d6d;
color:white;
}

#no{
background:#555;
color:white;
position:absolute;
}

.confetti{
position:fixed;
font-size:24px;
animation:confetti 3s linear forwards;
}

@keyframes confetti{
0%{transform:translateY(-10vh) rotate(0deg);}
100%{transform:translateY(110vh) rotate(720deg);}
}

.cursor-heart{
position:fixed;
pointer-events:none;
font-size:18px;
}

#danceArea{
display:none;
margin-top:40px;
justify-content:center;
align-items:center;
gap:20px;
}

#danceArea video{
height:240px;
border-radius:12px;
object-fit:cover;
}

</style>

</head>

<body>

<div class="container">

<div id="story"></div>

<button id="yes" onclick="yesClick()">YES ❤️</button>
<button id="no">NO 🙈</button>

<div id="danceArea">

<video id="dance1" loop muted>
<source src="dance1.mp4" type="video/mp4">
</video>

<video id="dance2" loop muted>
<source src="dance2.mp4" type="video/mp4">
</video>

</div>

</div>

<script>

const storyLines=[
"Hey Muktai...",
"We had a great conversation till now 🙂",
"I had one question for you...",
"Should we go out for a coffee next week? ☕"
];

let lineIndex=0;
let charIndex=0;

function typeStory(){

if(lineIndex<storyLines.length){

let line=storyLines[lineIndex];

if(charIndex<line.length){

document.getElementById("story").innerHTML+=line.charAt(charIndex);

charIndex++;

setTimeout(typeStory,40);

}else{

document.getElementById("story").innerHTML+="<br>";

lineIndex++;
charIndex=0;

setTimeout(typeStory,700);

}

}

}

typeStory();

const noBtn=document.getElementById("no");
const yesBtn=document.getElementById("yes");

const funnyMessages=[
"Wait wait... think again 😅",
"But coffee is good though ☕",
"We could also get sushi 🍣",
"And maybe ice-cream 🍦",
"Come on it would be fun 🙂"
];

let msgIndex=0;
let noCount=0;

noBtn.addEventListener("mouseover",function(){

let x=Math.random()*(window.innerWidth-100);
let y=Math.random()*(window.innerHeight-100);

noBtn.style.left=x+"px";
noBtn.style.top=y+"px";

document.getElementById("story").innerHTML=funnyMessages[msgIndex%funnyMessages.length];

msgIndex++;
noCount++;

if(noCount>=4){

document.getElementById("story").innerHTML="Okay Muktai 😄 clearly the YES button looks easier to click.";

yesBtn.style.transform="scale(2.2)";
noBtn.style.transform="scale(0.5)";

}

});

function yesClick(){

document.getElementById("story").innerHTML="YAY!! ❤️ I'm really happy you said YES!";

noBtn.style.display="none";

yesBtn.style.transform="scale(1.8)";
yesBtn.innerHTML="YES!!! ❤️";

const danceArea=document.getElementById("danceArea");
danceArea.style.display="flex";

const v1=document.getElementById("dance1");
const v2=document.getElementById("dance2");

v1.play();
v2.play();

for(let i=0;i<160;i++){

let conf=document.createElement("div");

conf.innerHTML=["🎉","❤️","✨","💖","🥳"][Math.floor(Math.random()*5)];

conf.classList.add("confetti");

conf.style.left=Math.random()*100+"vw";

conf.style.fontSize=(Math.random()*30+20)+"px";

document.body.appendChild(conf);

setTimeout(()=>{conf.remove()},3000);

}

}

document.addEventListener("mousemove",function(e){

let heart=document.createElement("div");

heart.innerHTML="❤️";

heart.classList.add("cursor-heart");

heart.style.left=e.pageX+"px";
heart.style.top=e.pageY+"px";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},600);

});

</script>

</body>
</html>
